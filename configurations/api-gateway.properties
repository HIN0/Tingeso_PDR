server.port=8080

# CORREGIDO: spring.cloud.gateway.mvc.routes (para Gateway MVC, no reactivo)
spring.cloud.gateway.mvc.routes[0].id=ms-entradas
spring.cloud.gateway.mvc.routes[0].uri=http://ms-entradas:8081
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/entradas/**

spring.cloud.gateway.mvc.routes[1].id=ms-salidas
spring.cloud.gateway.mvc.routes[1].uri=http://ms-salidas:8082
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/salidas/**

spring.cloud.gateway.mvc.routes[2].id=ms-resumen
spring.cloud.gateway.mvc.routes[2].uri=http://ms-resumen:8083
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/resumen/**

# CORS
spring.cloud.gateway.mvc.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.mvc.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE